; CircuitMap runtime overrides
; Sized for full-instance import archives (see /admin/instance), not just
; KML uploads — those stay capped by MAX_UPLOAD_BYTES at the app level.
upload_max_filesize = 512M
post_max_size = 520M
; Instance export/import raise their own limit via set_time_limit(300).
max_execution_time = 30
memory_limit = 128M

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; KML/KMZ parsing has no legitimate need for these; disabling narrows the
; blast radius if a future dependency vulnerability allows code execution.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen

session.save_handler = files
session.cookie_httponly = 1
session.use_strict_mode = 1
