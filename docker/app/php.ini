; CircuitMap runtime overrides
upload_max_filesize = 12M
post_max_size = 15M
max_execution_time = 30
memory_limit = 128M

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; KML/KMZ parsing has no legitimate need for these; disabling narrows the
; blast radius if a future dependency vulnerability allows code execution.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen

session.save_handler = files
session.cookie_httponly = 1
session.use_strict_mode = 1
